name: 编译OpenWrt固件(多设备)

on:
  workflow_dispatch:
    inputs:
      target_device:
        description: '选择要编译的设备（留空则编译所有）'
        required: false
        type: choice
        default: 'all'
        options:
          - all
          - Lean_x86_64
          - Lean_x86_64_Docker
      CACHE_BUILD:
        description: '缓存加速'
        required: false
        default: 'true'
        type: boolean
      SSH_ACTION:
        description: 'SSH远程配置固件'
        required: false
        default: 'false'
        type: boolean
      CLEAN_CACHE:
        description: '清理编译缓存'
        required: false
        default: 'false'
        type: boolean

# 定时触发编译(1,5,10,15,20,25,30早3点)
  schedule:
    - cron: 0 17 4,9,14,19,24,31 * *

env: 
  TZ: Asia/Shanghai
  MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  GITHUB_RELEASE: https://github.com/aoxijy/aoxi-openwrt/releases

jobs: 
  build:
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id || ! github.event.sender.id

    strategy:
      fail-fast: false
      matrix:
        target: ["Lean_x86_64", "Lean_x86_64_Docker"]
        # 如果手动选择了特定设备，则只编译该设备
        include:
          - target: "Lean_x86_64"
            condition: ${{ github.event.inputs.target_device == 'all' || github.event.inputs.target_device == 'Lean_x86_64' }}
          - target: "Lean_x86_64_Docker"
            condition: ${{ github.event.inputs.target_device == 'all' || github.event.inputs.target_device == 'Lean_x86_64_Docker' }}
        # 过滤掉不符合条件的设备
        exclude:
          - target: "Lean_x86_64"
            condition: ${{ !(github.event.inputs.target_device == 'all' || github.event.inputs.target_device == 'Lean_x86_64') }}
          - target: "Lean_x86_64_Docker"
            condition: ${{ !(github.event.inputs.target_device == 'all' || github.event.inputs.target_device == 'Lean_x86_64_Docker') }}

    name: 编译 ${{ matrix.target }}
    
    steps:
    - name: Checkout 仓库
      uses: actions/checkout@v4

    - name: 检测脚本设置
      run: |
        source "${GITHUB_WORKSPACE}/build/${{matrix.target}}/settings.ini"
        echo "REPO_URL=${REPO_URL}" >> $GITHUB_ENV
        echo "REPO_BRANCH=${REPO_BRANCH}" >> $GITHUB_ENV
        echo "CONFIG_FILE=${CONFIG_FILE}" >> $GITHUB_ENV
        echo "FIRMWARE_MESSAGE=${FIRMWARE_MESSAGE}" >> $GITHUB_ENV
        echo "CUSTOM_SH=${CUSTOM_SH}" >> $GITHUB_ENV
        echo "CACHE_BUILD=${CACHE_BUILD}" >> $GITHUB_ENV
        echo "SSH_ACTIONS=${SSH_ACTIONS}" >> $GITHUB_ENV
        echo "UPLOAD_FIRMWARE=${UPLOAD_FIRMWARE}" >> $GITHUB_ENV
        echo "UPLOAD_CONFIG=${UPLOAD_CONFIG}" >> $GITHUB_ENV
        echo "UPLOAD_RELEASE=${UPLOAD_RELEASE}" >> $GITHUB_ENV
        echo "TELEGRAM_BOT=${TELEGRAM_BOT}" >> $GITHUB_ENV
        #添加变量
        echo "HOME=${GITHUB_WORKSPACE}/openwrt_${{matrix.target}}" >> $GITHUB_ENV
        echo "WORKPATH=${GITHUB_WORKSPACE}/build/${{matrix.target}}" >> $GITHUB_ENV
        echo "BUILD_DIR=${GITHUB_WORKSPACE}/openwrt_${{matrix.target}}" >> $GITHUB_ENV

    - name: 清理编译缓存（如需要）
      if: github.event.inputs.CLEAN_CACHE == 'true'
      run: |
        echo "正在强制清理编译缓存..."
        # 清理可能的现有openwrt目录
        sudo rm -rf /github-builder/openwrt_${{matrix.target}}
        sudo rm -rf $GITHUB_WORKSPACE/openwrt_${{matrix.target}}
        echo "编译缓存已清理"

    - name: 初始化系统环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/apt/sources.list.d /usr/local/lib/android
        sudo -E apt-mark hold grub-efi-amd64-signed
        sudo -E apt update -y
        sudo -E apt -y purge azure-cli* docker* ghc* zulu* llvm* firefox google* dotnet* powershell* openjdk* mysql* php* mongodb* dotnet* snap* || true
        sudo -E apt full-upgrade -y
        sudo -E apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
                   bzip2 ccache clang cmake cpio curl device-tree-compiler ecj flex gawk gcc-multilib \
                   g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-i386 libelf-dev \
                   libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev \
                   libreadline-dev libssl-dev libpython3-dev libtool libyaml-dev libz-dev lld llvm lrzsz msmtp \
                   ninja-build p7zip p7zip-full patch pkgconf python3 python3 python3-ply python3-docutils \
                   python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
                   upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd libfuse-dev gettext genisoimage python3-setuptools || true
        sudo -E systemctl daemon-reload
        sudo -E apt -y autoremove --purge
        sudo -E apt clean

    - name: 编译前准备
      run: |
        sudo -E apt-get -y install xsltproc zip grep python3-pip python3-ply libc6-dev libtinfo-dev libtinfo5 ncurses-doc \
                    python2 git-core wget curl rsync dos2unix fakeroot jq libc6-dev-i386 libncurses5-dev libncursesw5 \
                    libncursesw5-dev quilt python3-distutils file g++ || true
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        sudo timedatectl set-timezone "$TZ"
        echo
        echo " 系统空间      类型   总数  已用  可用 使用率"
        df -hT $PWD

    - name: 释放Ubuntu磁盘空间
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: 创建模拟物理磁盘
      run: |
        mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
        root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
        sudo truncate -s "${mnt_size}"G /mnt/mnt.img
        sudo truncate -s "${root_size}"G /root.img
        sudo losetup /dev/loop6 /mnt/mnt.img
        sudo losetup /dev/loop7 /root.img
        sudo pvcreate /dev/loop6
        sudo pvcreate /dev/loop7
        sudo vgcreate github /dev/loop6 /dev/loop7
        sudo lvcreate -n runner -l 100%FREE github
        sudo mkfs.xfs /dev/github/runner
        sudo mkdir -p /github-builder
        sudo mount /dev/github/runner /github-builder
        sudo chown -R $USER:$GROUPS /github-builder
        df -Th

    - name: 下载源码
      working-directory: /github-builder
      run: |
        df -hT $PWD
        git clone -b ${{ env.REPO_BRANCH }} --single-branch ${{ env.REPO_URL }} openwrt_${{matrix.target}}
        ln -sf /github-builder/openwrt_${{matrix.target}} ${{ env.BUILD_DIR }}

    - name: 缓存加速
      uses: stupidloud/cachewrtbuild@main
      if: env.CACHE_BUILD == 'true' || (github.event.inputs.CACHE_BUILD == 'true')
      with:
        ccache: 'true'
        prefix: ${{ env.BUILD_DIR }}

    - name: 更新时区、编译时间
      id: date
      run: |
        sudo timedatectl set-timezone "$TZ"
        echo "FILE_TIME=$(date +"%m-%d %H.%M")" >> $GITHUB_ENV
        echo "FILE_TIME1=$(date "+%Y年%m月%d日-%H点%M分")" >> $GITHUB_ENV
        echo "FILE_TIME2=$(date "+%Y%m%d-%H%M")" >> $GITHUB_ENV
        echo "编译开始时间..."
        START_TIME=`date +'%Y-%m-%d %H:%M:%S'`
        echo "START_SECONDS=$(date --date="$START_TIME" +%s)" >> $GITHUB_ENV

    - name: 加载源,定制文件并生成自定义配置
      run: |
        # 复制配置文件到源码目录
        cp -Rf `find ./ -maxdepth 1 -type d ! -path './openwrt_*' ! -path './'` ${{ env.BUILD_DIR }}
        cd ${{ env.BUILD_DIR }}

        echo "执行脚本"
        if [ -f "${{ env.WORKPATH }}/${{ env.CUSTOM_SH }}" ]; then
        (
          chmod +x ${{ env.WORKPATH }}/${{ env.CUSTOM_SH }}
          /bin/bash "${{ env.WORKPATH }}/${{ env.CUSTOM_SH }}"
        )
        fi

        echo "复制脚本文件..."
        if [ -n "$(ls -A "${GITHUB_WORKSPACE}/build/scripts/files" 2>/dev/null)" ]; then
          if [ -d "files" ];then
           cp -rf ${GITHUB_WORKSPACE}/build/scripts/files/* files
           chmod -R 755 ${HOME}/files
          else
           cp -rf ${GITHUB_WORKSPACE}/build/scripts/files/ files
           chmod -R 755 ${HOME}/files
          fi
        fi

        echo "复制配置文件..."
        if [ -n "$(ls -A "${{ env.WORKPATH }}/files" 2>/dev/null)" ]; then
          if [ -d "files" ];then
           cp -rf ${{ env.WORKPATH }}/files/* files
           chmod -R 755 ${{ env.WORKPATH }}/files
          else
           cp -rf ${{ env.WORKPATH }}/files/ files
           chmod -R 755 ${{ env.WORKPATH }}/files
          fi
        fi

        echo "复制源码文件..."
        if [ -n "$(ls -A "${{ env.WORKPATH }}/sources" 2>/dev/null)" ]; then
         cp -Rf ${{ env.WORKPATH }}/sources/* ./
        fi

        echo "写入配置文件..."
        mv ${{ env.WORKPATH }}/${{ env.CONFIG_FILE }} .config
        

        make defconfig

    - name: SSH远程连接服务器
      uses: db-one/debugger-action@main
      if: env.SSH_ACTIONS == 'true' || (github.event.inputs.SSH_ACTION == 'true')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: 输出编译信息
      run: |
        cd ${{ env.BUILD_DIR }}

        echo
        echo " 系统空间      类型   总数  已用  可用 使用率"
        df -hT $PWD

        echo
        echo "=========================================="
        echo

        echo "	    CPU物理数量:$(cat /proc/cpuinfo| grep "physical id"| sort| uniq| wc -l)"
        echo "	    CPU核心及版本信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c)"

        echo
        echo "=========================================="
        echo


        ZZZ="package/lean/default-settings/files/zzz-default-settings"
        if [ -f "$ZZZ" ]; then
          echo "	    当前编译版本：$(cat $ZZZ|grep DISTRIB_REVISION= | sed 's/^.\{24\}//g' | sed 's/.\{26\}$//')"
        fi

        echo "KERNEL_PATCHVER=$(cat target/linux/x86/Makefile|grep KERNEL_PATCHVER | sed 's/^.\{17\}//g')" >> $GITHUB_ENV
        echo "	    内核版本：$(cat target/linux/x86/Makefile|grep KERNEL_PATCHVER | sed 's/^.\{17\}//g')"
        echo "	    源码分支：${{ env.REPO_BRANCH }}"

        echo "	    编译时间：${{ env.FILE_TIME1 }}"

        echo
        echo "=========================================="

        grep -i CONFIG_PACKAGE_luci-app .config | grep  -v \# > Plug-in
        grep -i CONFIG_PACKAGE_luci-theme .config | grep  -v \# >> Plug-in
        sed -i '/INCLUDE/d' Plug-in > /dev/null 2>&1
        sed -i 's/CONFIG_PACKAGE_/、/g' Plug-in
        sed -i '/Transparent_Proxy/d' Plug-in > /dev/null 2>&1 #排除 luci-app-passwall_Transparent_Proxy
        sed -i '/qbittorrent-simple_dynamic/d' Plug-in > /dev/null 2>&1 #排除 luci-app-qbittorrent-simple_dynamic
        sed -i 's/=y/\ /g' Plug-in
        awk '$0=NR$0' Plug-in > Plug-2
        awk '{print "	" $0}' Plug-2 > Plug-in

        echo
        echo
        echo "	      已选插件列表"
        cat Plug-in
        rm -rf {Plug-in,Plug-2}

        echo
        echo "=========================================="

        echo
        echo
        echo "输出完整插件信息..."
        echo
        echo
        cat .config

    - name: 下载编译所需文件
      run: |
        cd ${{ env.BUILD_DIR }} && make download -j4

    - name: 开始编译固件
      id: compile
      run: |
        cd ${{ env.BUILD_DIR }}
        make -j$(nproc) V=sc 2>&1 | tee build.log || (echo "编译失败，查看详细日志..." && tail -n 100 build.log && exit 1)

    - name: 检查空间使用情况
      run: |
        echo "======================="
        echo "Space usage:"
        echo "======================="
        df -hT
        echo "======================="
        du -h --max-depth=1 ${{ env.BUILD_DIR }}/ --exclude=build_dir --exclude=bin
        du -h --max-depth=1 ${{ env.BUILD_DIR }}/build_dir
        du -h --max-depth=1 ${{ env.BUILD_DIR }}/bin

    - name: 详细错误诊断
      if: failure()
      run: |
        cd ${{ env.BUILD_DIR }}
        echo "=== 详细错误诊断 ==="
        
        echo "1. 检查包冲突:"
        grep -E "CONFIG_PACKAGE_(vsftpd|vsftpd-alt)" .config || echo "未找到 FTP 相关配置"
        
        echo ""
        echo "2. 查找其他可能的冲突:"
        find . -name "*.mk" -exec grep -l "conflict\|clash" {} \; | head -n 5
        
        echo ""
        echo "3. 检查编译日志中的错误:"
        grep -i "error\|conflict\|clash" build.log | tail -n 20
        
        echo ""
        echo "4. 检查已安装的包:"
        find staging_dir -name "*.install" -exec grep -l "vsftpd" {} \; | head -n 5

    - name: 整理固件文件
      if: success()
      id: organizer
      run: |
        mkdir -p ./artifact/firmware_${{matrix.target}}
        mkdir -p ./artifact/buildinfo_${{matrix.target}}
        cp -rf ${{ env.BUILD_DIR }}/.config ./artifact/buildinfo_${{matrix.target}}/${{matrix.target}}.config || true
        rm -rf $(find ${{ env.BUILD_DIR }}/bin/targets/ -type d -name "packages")
        cp -rf $(find ${{ env.BUILD_DIR }}/bin/targets/ -type f -name "*.buildinfo" -o -name "*.manifest") ./artifact/buildinfo_${{matrix.target}}/ || true        
        cp -rf $(find ${{ env.BUILD_DIR }}/bin/targets/ -type f \( -name "*squashfs*efi*img*" -o -name "*squashfs*sysupgrade*bin*" -o -name "*squashfs*factory*bin*" \) ) ./artifact/firmware_${{matrix.target}}/
        echo "编译完成时间..."
        START_SECONDS=${{ env.START_SECONDS }}
        END_TIME=`date +'%Y-%m-%d %H:%M:%S'`
        END_SECONDS=$(date --date="$END_TIME" +%s)
        SECONDS=$((END_SECONDS-START_SECONDS))
        HOUR=$(( $SECONDS/3600 )) && MIN=$(( ($SECONDS-${HOUR}*3600)/60 )) && SEC=$(( $SECONDS-${HOUR}*3600-${MIN}*60 ))
        echo "BUILD_TIME=${HOUR}时${MIN}分${SEC}秒" >> $GITHUB_ENV

    - name: 上传固件文件
      if: steps.compile.outcome == 'success' && env.UPLOAD_FIRMWARE == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{matrix.target}}_OpenWrt_firmware_${{ env.FILE_TIME }}
        path: ./artifact/firmware_${{matrix.target}}/

    - name: 上传编译日志
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build_log_${{matrix.target}}_${{ github.run_id }}
        path: ${{ env.BUILD_DIR }}/build.log

    - name: 上传固件信息
      if: steps.compile.outcome == 'success' && env.UPLOAD_CONFIG == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{matrix.target}}_OpenWrt_buildinfo_${{ env.FILE_TIME }}
        path: ./artifact/buildinfo_${{matrix.target}}/

    - name: 自动发布固件到 Releases
      uses: ncipollo/release-action@main
      if: steps.compile.outcome == 'success' && env.UPLOAD_RELEASE == 'true'
      with:
        name: ${{ env.FILE_TIME1 }} 「 ${{ env.FIRMWARE_MESSAGE }} 」
        tag: ${{ env.FILE_TIME2 }}-${{matrix.target}}
        token: ${{ secrets.MY_GITHUB_TOKEN }}
        body: |            
            ★  源码 : ${{ env.REPO_URL }}
            ★  分支 : ${{ env.REPO_BRANCH }}
            ★  感谢源码作者无私分享！

            🖥 内核版本：${{ env.KERNEL_PATCHVER }}

            🎈 编译时间：${{ env.FILE_TIME1 }}

            ⏰ 编译用时：${{ env.BUILD_TIME }}

            🎉 [ ${{ env.FIRMWARE_MESSAGE }} ]固件下载

            ━━━━━━━━━━━━━━━━━━━━

            =========================================

        artifacts: ./artifact/firmware_${{matrix.target}}/*

    - name: 编译成功信息通知-Telegram
      if: steps.compile.outcome == 'success' && env.TELEGRAM_BOT == 'true'
      run: |
        curl "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=

           您的${{ env.FIRMWARE_MESSAGE }}固件成功编译完成了！

          🖥 内核版本：${{ env.KERNEL_PATCHVER }}

          🎈 编译时间：${{ env.FILE_TIME1 }}

          ⏰ 编译用时：${{ env.BUILD_TIME }}

          🎉 发布地址：${{ env.GITHUB_RELEASE }}

          🌴 固件已经编译完成 🎈！！！

          " >/dev/null 2>&1 && echo "ok..."

  cleanup:
    runs-on: ubuntu-22.04
    needs: build
    if: always()
    
    steps:
    - name: 删除运行记录
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ secrets.MY_GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 30     #保留最后多少记录不删除
        keep_minimum_runs: 0

    - name: 删除自动发布的旧固件
      uses: shidahuilang/delete-older-releases@main
      with:
        keep_latest: 20         #保留多少个releases不删除
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
