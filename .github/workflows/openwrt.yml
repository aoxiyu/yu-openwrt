name: 编译OpenWrt固件(Lean_x86_64)

on:
  workflow_dispatch:
    inputs:
      CACHE_BUILD:
        description: '缓存加速'
        required: false
        default: 'true'
        type: boolean

      SSH_ACTION:
        description: 'SSH远程配置固件'
        required: false
        default: 'false'
        type: boolean

      CLEAN_CACHE:
        description: '清理编译缓存'
        required: false
        default: 'false'
        type: boolean

# 定时触发编译(1,5,10,15,20,25,30早3点)
  schedule:
    - cron: 0 17 4,9,14,19,24,31 * *

env: 
  TZ: Asia/Shanghai
  MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  GITHUB_RELEASE: https://github.com/aoxijy/aoxi-openwrt/releases

jobs: 
  build:
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id || ! github.event.sender.id

    name: 编译 Lean_x86_64
    strategy:
      fail-fast: false
      matrix:
        target: ["Lean_x86_64"]

    steps:
    - name: Checkout 仓库
      uses: actions/checkout@v4

    - name: 检测脚本设置
      run: |
        if [ -f "${GITHUB_WORKSPACE}/build/${{matrix.target}}/settings.ini" ]; then
          source "${GITHUB_WORKSPACE}/build/${{matrix.target}}/settings.ini"
          echo "REPO_URL=${REPO_URL}" >> $GITHUB_ENV
          echo "REPO_BRANCH=${REPO_BRANCH}" >> $GITHUB_ENV
          echo "CONFIG_FILE=${CONFIG_FILE}" >> $GITHUB_ENV
          echo "FIRMWARE_MESSAGE=${FIRMWARE_MESSAGE}" >> $GITHUB_ENV
          echo "CUSTOM_SH=${CUSTOM_SH}" >> $GITHUB_ENV
          echo "CACHE_BUILD=${CACHE_BUILD:-true}" >> $GITHUB_ENV
          echo "SSH_ACTIONS=${SSH_ACTIONS:-false}" >> $GITHUB_ENV
          echo "UPLOAD_FIRMWARE=${UPLOAD_FIRMWARE:-true}" >> $GITHUB_ENV
          echo "UPLOAD_CONFIG=${UPLOAD_CONFIG:-false}" >> $GITHUB_ENV
          echo "UPLOAD_RELEASE=${UPLOAD_RELEASE:-false}" >> $GITHUB_ENV
          echo "TELEGRAM_BOT=${TELEGRAM_BOT:-false}" >> $GITHUB_ENV
        else
          echo "警告：未找到settings.ini文件，使用默认值"
          echo "REPO_URL=https://github.com/coolsnowwolf/lede" >> $GITHUB_ENV
          echo "REPO_BRANCH=master" >> $GITHUB_ENV
          echo "CONFIG_FILE=.config" >> $GITHUB_ENV
          echo "FIRMWARE_MESSAGE=Lean_x86_64固件" >> $GITHUB_ENV
          echo "CUSTOM_SH=custom.sh" >> $GITHUB_ENV
          echo "CACHE_BUILD=true" >> $GITHUB_ENV
          echo "SSH_ACTIONS=false" >> $GITHUB_ENV
          echo "UPLOAD_FIRMWARE=true" >> $GITHUB_ENV
          echo "UPLOAD_CONFIG=false" >> $GITHUB_ENV
          echo "UPLOAD_RELEASE=false" >> $GITHUB_ENV
          echo "TELEGRAM_BOT=false" >> $GITHUB_ENV
        fi
        
        #添加变量
        echo "HOME=${GITHUB_WORKSPACE}/openwrt" >> $GITHUB_ENV
        echo "WORKPATH=${GITHUB_WORKSPACE}/openwrt/build/${{matrix.target}}" >> $GITHUB_ENV

    - name: 清理编译缓存（如需要）
      if: github.event.inputs.CLEAN_CACHE == 'true'
      run: |
        echo "正在强制清理编译缓存..."
        # 清理可能的现有openwrt目录
        sudo rm -rf /github-builder/openwrt
        sudo rm -rf $GITHUB_WORKSPACE/openwrt
        echo "编译缓存已清理"

    - name: 初始化系统环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/apt/sources.list.d /usr/local/lib/android
        sudo -E apt-mark hold grub-efi-amd64-signed
        sudo -E apt update -y
        sudo -E apt -y purge azure-cli* docker* ghc* zulu* llvm* firefox google* dotnet* powershell* openjdk* mysql* php* mongodb* dotnet* snap* || echo "清理部分包失败，继续..."
        sudo -E apt full-upgrade -y
        sudo -E apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
                   bzip2 ccache clang cmake cpio curl device-tree-compiler ecj flex gawk gcc-multilib \
                   g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-i386 libelf-dev \
                   libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev \
                   libreadline-dev libssl-dev libpython3-dev libtool libyaml-dev libz-dev lld llvm lrzsz msmtp \
                   ninja-build p7zip p7zip-full patch pkgconf python3 python3 python3-ply python3-docutils \
                   python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
                   upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd libfuse-dev gettext genisoimage python3-setuptools || echo "安装编译依赖失败，继续..."
        sudo -E systemctl daemon-reload
        sudo -E apt -y autoremove --purge
        sudo -E apt clean

    - name: 编译前准备
      run: |
        sudo -E apt-get -y install xsltproc zip grep python3-pip python3-ply libc6-dev libtinfo-dev libtinfo5 ncurses-doc \
                    python2 git-core wget curl rsync dos2unix fakeroot jq libc6-dev-i386 libncurses5-dev libncursesw5 \
                    libncursesw5-dev quilt python3-distutils file g++ || echo "安装额外依赖失败，继续..."
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        sudo timedatectl set-timezone "$TZ"
        echo
        echo " 系统空间      类型   总数  已用  可用 使用率"
        df -hT $PWD

    - name: 释放Ubuntu磁盘空间
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: 创建模拟物理磁盘
      run: |
        mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
        root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
        sudo truncate -s "${mnt_size}"G /mnt/mnt.img
        sudo truncate -s "${root_size}"G /root.img
        sudo losetup /dev/loop6 /mnt/mnt.img
        sudo losetup /dev/loop7 /root.img
        sudo pvcreate /dev/loop6
        sudo pvcreate /dev/loop7
        sudo vgcreate github /dev/loop6 /dev/loop7
        sudo lvcreate -n runner -l 100%FREE github
        sudo mkfs.xfs /dev/github/runner
        sudo mkdir -p /github-builder
        sudo mount /dev/github/runner /github-builder
        sudo chown -R $USER:$GROUPS /github-builder
        df -Th

    - name: 下载Lean_x86_64源码
      working-directory: /github-builder
      run: |
        df -hT $PWD
        if [ ! -d "openwrt" ]; then
          echo "正在克隆源码..."
          git clone -b $REPO_BRANCH --single-branch $REPO_URL openwrt
        else
          echo "源码已存在，跳过克隆"
        fi
        ln -sf /github-builder/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 缓存加速
      uses: stupidloud/cachewrtbuild@main
      if: env.CACHE_BUILD == 'true' || (github.event.inputs.CACHE_BUILD == 'true')
      with:
        ccache: 'true'
        prefix: ${{ github.workspace }}/openwrt

    - name: 更新时区、编译时间
      id: date
      run: |
        sudo timedatectl set-timezone "$TZ"
        echo "FILE_TIME=$(date +"%m-%d %H.%M")" >> $GITHUB_ENV
        echo "FILE_TIME1=$(date "+%Y年%m月%d日-%H点%M分")" >> $GITHUB_ENV
        echo "FILE_TIME2=$(date "+%Y%m%d-%H%M")" >> $GITHUB_ENV
        echo "编译开始时间..."
        START_TIME=`date +'%Y-%m-%d %H:%M:%S'`
        echo "START_SECONDS=$(date --date="$START_TIME" +%s)" >> $GITHUB_ENV

    - name: 加载源,定制文件并生成自定义配置
      run: |
        # 复制配置文件到源码目录
        echo "复制配置文件到源码目录..."
        cp -Rf `find ./ -maxdepth 1 -type d ! -path './openwrt' ! -path './'` openwrt 2>/dev/null || echo "复制配置文件完成"
        cd openwrt

        echo "执行自定义脚本..."
        if [ -f "${WORKPATH}/$CUSTOM_SH" ]; then
        (
          chmod +x "${WORKPATH}/$CUSTOM_SH"
          /bin/bash "${WORKPATH}/$CUSTOM_SH"
        )
        else
          echo "警告：未找到自定义脚本 ${WORKPATH}/$CUSTOM_SH"
        fi

        echo "复制脚本文件..."
        if [ -n "$(ls -A "${GITHUB_WORKSPACE}/openwrt/build/scripts/files" 2>/dev/null)" ]; then
          if [ -d "files" ];then
           cp -rf ${GITHUB_WORKSPACE}/openwrt/build/scripts/files/* files
           chmod -R 755 ${HOME}/files
          else
           cp -rf ${GITHUB_WORKSPACE}/openwrt/build/scripts/files/ files
           chmod -R 755 ${HOME}/files
          fi
        fi

        echo "复制配置文件..."
        if [ -n "$(ls -A "${WORKPATH}/files" 2>/dev/null)" ]; then
          if [ -d "files" ];then
           cp -rf ${WORKPATH}/files/* files
           chmod -R 755 ${WORKPATH}/files
          else
           cp -rf ${WORKPATH}/files/ files
           chmod -R 755 ${WORKPATH}/files
          fi
        fi

        echo "复制源码文件..."
        if [ -n "$(ls -A "${WORKPATH}/sources" 2>/dev/null)" ]; then
         cp -Rf ${WORKPATH}/sources/* ./
        fi

        echo "写入配置文件..."
        if [ -f "${WORKPATH}/$CONFIG_FILE" ]; then
          mv ${WORKPATH}/$CONFIG_FILE .config
        else
          echo "警告：未找到配置文件 ${WORKPATH}/$CONFIG_FILE，使用默认配置"
        fi
        
        # 启用EXT4文件系统支持
        echo "CONFIG_TARGET_ROOTFS_EXT4FS=y" >> .config
        echo "CONFIG_TARGET_ROOTFS_EXT4FS_BLOCKS=2048" >> .config
        echo "CONFIG_TARGET_ROOTFS_EXT4FS_INODES=512" >> .config
        echo "CONFIG_TARGET_IMAGES_EXT4=y" >> .config
        echo "CONFIG_GRUB_IMAGES=y" >> .config
        echo "CONFIG_GRUB_EFI_IMAGES=y" >> .config
        echo "CONFIG_TARGET_ROOTFS_SQUASHFS=y" >> .config

        make defconfig
        
        # 验证配置是否生效
        echo "检查EXT4配置是否启用:"
        grep "CONFIG_TARGET_ROOTFS_EXT4FS" .config || echo "EXT4配置未找到"
        echo "检查EFI配置是否启用:"
        grep "CONFIG_GRUB_EFI_IMAGES" .config || echo "EFI配置未找到"

    - name: SSH远程连接服务器
      uses: db-one/debugger-action@main
      if: env.SSH_ACTIONS == 'true' || (github.event.inputs.SSH_ACTION == 'true')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: 输出编译信息
      run: |
        cd openwrt

        echo
        echo " 系统空间      类型   总数  已用  可用 使用率"
        df -hT $PWD

        echo
        echo "=========================================="
        echo

        echo "	    CPU物理数量:$(cat /proc/cpuinfo| grep "physical id"| sort| uniq| wc -l)"
        echo "	    CPU核心及版本信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c)"

        echo
        echo "=========================================="
        echo


        ZZZ="package/lean/default-settings/files/zzz-default-settings"
        if [ -f "$ZZZ" ]; then
          echo "	    当前编译版本：$(cat $ZZZ|grep DISTRIB_REVISION= | sed 's/^.\{24\}//g' | sed 's/.\{26\}$//')"
        fi

        KERNEL_PATCHVER=$(cat target/linux/x86/Makefile|grep KERNEL_PATCHVER | sed 's/^.\{17\}//g')
        echo "KERNEL_PATCHVER=${KERNEL_PATCHVER}" >> $GITHUB_ENV
        echo "	    内核版本：${KERNEL_PATCHVER}"
        echo "	    源码分支：${{ env.REPO_BRANCH }}"

        echo "	    编译时间：${{ env.FILE_TIME1 }}"

        echo
        echo "=========================================="

        # 显示文件系统配置信息
        echo "文件系统配置:"
        grep -E "CONFIG_TARGET_ROOTFS_(SQUASHFS|EXT4FS)" .config || echo "未找到文件系统配置"
        grep -E "CONFIG_TARGET_IMAGES_(EXT4|SQUASHFS)" .config || echo "未找到镜像配置"
        grep -E "CONFIG_GRUB_(IMAGES|EFI_IMAGES)" .config || echo "未找到GRUB配置"

        echo
        echo "=========================================="

        grep -i CONFIG_PACKAGE_luci-app .config | grep  -v \# > Plug-in
        grep -i CONFIG_PACKAGE_luci-theme .config | grep  -v \# >> Plug-in
        sed -i '/INCLUDE/d' Plug-in > /dev/null 2>&1
        sed -i 's/CONFIG_PACKAGE_/、/g' Plug-in
        sed -i '/Transparent_Proxy/d' Plug-in > /dev/null 2>&1 #排除 luci-app-passwall_Transparent_Proxy
        sed -i '/qbittorrent-simple_dynamic/d' Plug-in > /dev/null 2>&1 #排除 luci-app-qbittorrent-simple_dynamic
        sed -i 's/=y/\ /g' Plug-in
        awk '$0=NR$0' Plug-in > Plug-2
        awk '{print "	" $0}' Plug-2 > Plug-in

        echo
        echo
        echo "	      已选插件列表"
        cat Plug-in
        rm -rf {Plug-in,Plug-2}

        echo
        echo "=========================================="

        echo
        echo
        echo "输出完整插件信息..."
        echo
        echo
        cat .config

    - name: 下载编译所需文件
      run: |
        cd openwrt
        make download -j$(nproc) || make download -j4 || echo "下载失败，继续编译..."

    - name: 开始编译固件
      id: compile
      run: |
        cd openwrt
        make -j$(nproc) V=sc 2>&1 | tee build.log || (echo "编译失败，查看详细日志..." && tail -n 100 build.log && exit 1)

    - name: 检查生成的固件文件
      if: success()
      run: |
        echo "=== 检查编译输出目录 ==="
        if [ -d "openwrt/bin/targets" ]; then
          echo "目标目录结构:"
          find openwrt/bin/targets/ -type f 2>/dev/null | head -30
          
          echo ""
          echo "所有固件文件:"
          find openwrt/bin/targets/ -type f \( -name "*.img" -o -name "*.img.gz" -o -name "*.bin" -o -name "*.bin.gz" \) 2>/dev/null
          
          echo ""
          echo "按类型分类:"
          echo "1. EXT4文件系统固件:"
          find openwrt/bin/targets/ -type f -name "*ext4*" 2>/dev/null
          echo ""
          echo "2. SquashFS文件系统固件:"
          find openwrt/bin/targets/ -type f -name "*squashfs*" 2>/dev/null
          echo ""
          echo "3. 所有镜像文件:"
          find openwrt/bin/targets/ -type f -name "*.img*" 2>/dev/null
        else
          echo "错误：openwrt/bin/targets 目录不存在！"
          echo "检查编译是否成功..."
          if [ -d "openwrt/bin" ]; then
            echo "bin目录内容:"
            ls -la openwrt/bin/
            find openwrt/bin/ -type f 2>/dev/null | head -20
          fi
          exit 1
        fi

    - name: 检查空间使用情况
      run: |
        echo "======================="
        echo "Space usage:"
        echo "======================="
        df -hT
        echo "======================="
        du -h --max-depth=1 openwrt/ --exclude=build_dir --exclude=bin
        du -h --max-depth=1 openwrt/build_dir
        du -h --max-depth=1 openwrt/bin

    - name: 详细错误诊断
      if: failure()
      run: |
        cd openwrt
        echo "=== 详细错误诊断 ==="
        
        echo "1. 检查包冲突:"
        grep -E "CONFIG_PACKAGE_(vsftpd|vsftpd-alt)" .config || echo "未找到 FTP 相关配置"
        
        echo ""
        echo "2. 查找其他可能的冲突:"
        find . -name "*.mk" -exec grep -l "conflict\|clash" {} \; | head -n 5
        
        echo ""
        echo "3. 检查编译日志中的错误:"
        grep -i "error\|conflict\|clash" build.log | tail -n 20
        
        echo ""
        echo "4. 检查已安装的包:"
        find staging_dir -name "*.install" -exec grep -l "vsftpd" {} \; | head -n 5
        
        echo ""
        echo "5. 检查文件系统配置:"
        grep -E "CONFIG_TARGET_ROOTFS|CONFIG_TARGET_IMAGES" .config

    - name: 整理固件文件
      if: success()
      id: organizer
      run: |
        echo "开始整理固件文件..."
        
        # 创建必要的目录
        mkdir -p ./artifact/firmware
        mkdir -p ./artifact/buildinfo
        
        # 复制配置文件
        if [ -f "openwrt/.config" ]; then
          cp -rf openwrt/.config ./artifact/buildinfo/${{matrix.target}}.config
          echo "已复制配置文件"
        else
          echo "警告：未找到 .config 文件"
        fi
        
        # 复制buildinfo和manifest文件
        if [ -d "openwrt/bin/targets" ]; then
          # 查找并复制 buildinfo 和 manifest 文件
          find openwrt/bin/targets/ -type f \( -name "*.buildinfo" -o -name "*.manifest" \) -exec cp -rf {} ./artifact/buildinfo/ \; 2>/dev/null || true
          echo "已复制buildinfo和manifest文件"
        fi
        
        # 复制固件文件 - 使用更通用的匹配模式
        FIRMWARE_COUNT=0
        if [ -d "openwrt/bin/targets" ]; then
          echo "正在搜索固件文件..."
          
          # 首先查找所有可能的固件文件
          echo "查找所有镜像文件:"
          find openwrt/bin/targets/ -type f \( -name "*.img.gz" -o -name "*.img" -o -name "*.bin" \) 2>/dev/null
          
          # 复制所有找到的固件文件
          echo "复制固件文件..."
          find openwrt/bin/targets/ -type f \( -name "*.img.gz" -o -name "*.img" -o -name "*.bin" \) -exec cp -rf {} ./artifact/firmware/ \; 2>/dev/null
          
          # 统计找到的文件数量
          FIRMWARE_COUNT=$(ls -1 ./artifact/firmware/ 2>/dev/null | wc -l)
        fi
        
        # 检查是否复制到了固件
        if [ $FIRMWARE_COUNT -gt 0 ]; then
          echo "成功找到 $FIRMWARE_COUNT 个固件文件:"
          echo "================================"
          ls -la ./artifact/firmware/
          echo "================================"
          echo "文件详情:"
          for file in ./artifact/firmware/*; do
            if [ -f "$file" ]; then
              size=$(du -h "$file" | cut -f1)
              echo "  - $(basename "$file") (${size})"
            fi
          done
          
          # 设置一个标志，表示找到了固件
          echo "HAS_FIRMWARE=true" >> $GITHUB_ENV
        else
          echo "错误：未找到固件文件！"
          echo "检查目录结构:"
          find openwrt/bin/ -type f 2>/dev/null | head -30 || true
          echo "HAS_FIRMWARE=false" >> $GITHUB_ENV
          exit 1
        fi
        
        # 计算编译时间
        echo "编译完成时间..."
        START_SECONDS=${{ env.START_SECONDS }}
        END_TIME=`date +'%Y-%m-%d %H:%M:%S'`
        END_SECONDS=$(date --date="$END_TIME" +%s)
        SECONDS=$((END_SECONDS-START_SECONDS))
        HOUR=$(( $SECONDS/3600 )) 
        MIN=$(( ($SECONDS-${HOUR}*3600)/60 )) 
        SEC=$(( $SECONDS-${HOUR}*3600-${MIN}*60 ))
        BUILD_TIME="${HOUR}时${MIN}分${SEC}秒"
        echo "BUILD_TIME=${BUILD_TIME}" >> $GITHUB_ENV
        echo "编译用时：${BUILD_TIME}"

    - name: 上传固件到Artifacts
      if: success() && env.HAS_FIRMWARE == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{matrix.target}}_OpenWrt_firmware_${{ env.FILE_TIME }}
        path: ./artifact/firmware/
        retention-days: 7

    - name: 上传编译日志
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build_log_${{ github.run_id }}
        path: openwrt/build.log
        retention-days: 7

    - name: 上传固件信息
      if: success() && env.HAS_FIRMWARE == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{matrix.target}}_OpenWrt_buildinfo_${{ env.FILE_TIME }}
        path: ./artifact/buildinfo/
        retention-days: 7

    - name: 检查固件文件
      if: success() && env.HAS_FIRMWARE == 'true'
      run: |
        echo "=== 检查artifact/firmware目录 ==="
        if [ -d "./artifact/firmware" ]; then
          echo "固件目录内容:"
          ls -la ./artifact/firmware/
          echo "文件数量: $(ls -1 ./artifact/firmware/ | wc -l)"
          
          # 检查文件大小
          for file in ./artifact/firmware/*; do
            if [ -f "$file" ]; then
              size=$(du -h "$file" | cut -f1)
              echo "文件: $(basename "$file") 大小: ${size}"
            fi
          done
        else
          echo "错误：artifact/firmware目录不存在"
        fi

    - name: 自动发布固件到 Releases
      uses: ncipollo/release-action@v1
      if: success() && env.HAS_FIRMWARE == 'true' && env.UPLOAD_RELEASE == 'true'
      with:
        name: ${{ env.FILE_TIME1 }} 「 ${{ env.FIRMWARE_MESSAGE }} 」
        tag: ${{ env.FILE_TIME2 }}-${{matrix.target}}
        token: ${{ secrets.MY_GITHUB_TOKEN }}
        body: |            
            ★ 源码: ${{ env.REPO_URL }}
            ★ 分支: ${{ env.REPO_BRANCH }}
            ★ 感谢源码作者无私分享！

            🖥 内核版本: ${{ env.KERNEL_PATCHVER }}

            🎈 编译时间: ${{ env.FILE_TIME1 }}

            ⏰ 编译用时: ${{ env.BUILD_TIME }}

            📁 固件格式: 包含 EXT4 和 SquashFS 两种文件系统
            
            🎉 [ ${{ env.FIRMWARE_MESSAGE }} ]固件下载

            ━━━━━━━━━━━━━━━━━━━━

            =========================================
        artifacts: "./artifact/firmware/*"
        draft: false
        prerelease: false

    - name: 删除运行记录
      if: success() && env.HAS_FIRMWARE == 'true' && env.UPLOAD_RELEASE == 'true'
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ secrets.MY_GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 30
        keep_minimum_runs: 0

    - name: 删除自动发布的旧固件
      if: success() && env.HAS_FIRMWARE == 'true' && env.UPLOAD_RELEASE == 'true'
      uses: shidahuilang/delete-older-releases@main
      with:
        keep_latest: 20
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}

    - name: 编译成功信息通知-Telegram
      if: success() && env.HAS_FIRMWARE == 'true' && env.TELEGRAM_BOT == 'true'
      run: |
        # 获取固件列表
        FIRMWARE_LIST=""
        if [ -d "./artifact/firmware" ]; then
          FIRMWARE_LIST=$(cd ./artifact/firmware && ls -1 *.img.gz *.bin 2>/dev/null | head -10 | while read line; do echo "    - $line"; done || echo "无固件文件")
        fi
        
        # 统计不同类型的固件
        EXT4_COUNT=0
        SQUASHFS_COUNT=0
        if [ -d "./artifact/firmware" ]; then
          EXT4_COUNT=$(cd ./artifact/firmware && ls -1 *ext4* 2>/dev/null | wc -l || echo 0)
          SQUASHFS_COUNT=$(cd ./artifact/firmware && ls -1 *squashfs* 2>/dev/null | wc -l || echo 0)
        fi
        
        MESSAGE="您的${{ env.FIRMWARE_MESSAGE }}固件成功编译完成了！

        🖥 内核版本：${{ env.KERNEL_PATCHVER }}

        🎈 编译时间：${{ env.FILE_TIME1 }}

        ⏰ 编译用时：${{ env.BUILD_TIME }}

        📊 固件统计：
        - EXT4格式：${EXT4_COUNT}个
        - SquashFS格式：${SQUASHFS_COUNT}个

        主要固件文件：
        ${FIRMWARE_LIST}

        🎉 发布地址：${{ env.GITHUB_RELEASE }}"

        # 发送Telegram消息
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="$MESSAGE" \
          -d parse_mode="HTML" \
          >/dev/null 2>&1 && echo "Telegram通知发送成功"
