name: зј–иҜ‘OpenWrtеӣәд»¶(Leanзі»еҲ—)

on:
  workflow_dispatch:
    inputs:
      Lean_x86_64:
        description: 'зј–иҜ‘ Lean_x86_64'
        type: boolean
        default: false
      Lean_x86_64_Docker:
        description: 'зј–иҜ‘ Lean_x86_64_Docker'
        type: boolean
        default: false    
      CACHE_BUILD:
        description: 'зј“еӯҳеҠ йҖҹ'
        required: false
        default: 'true'
        type: boolean
      SSH_ACTION:
        description: 'SSHиҝңзЁӢй…ҚзҪ®еӣәд»¶'
        required: false
        default: 'false'
        type: boolean
      CLEAN_CACHE:
        description: 'жё…зҗҶзј–иҜ‘зј“еӯҳ'
        required: false
        default: 'false'
        type: boolean

# е®ҡж—¶и§ҰеҸ‘зј–иҜ‘(1,5,10,15,20,25,30ж—©3зӮ№)
  schedule:
    - cron: 0 17 4,9,14,19,24,31 * *

env: 
  TZ: Asia/Shanghai
  MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  GITHUB_RELEASE: https://github.com/aoxijy/aoxi-openwrt/releases

jobs: 
  # з”ҹжҲҗи®ҫеӨҮж•°з»„
  build-openwrt:
    runs-on: ubuntu-latest
    outputs:
      selected_models: ${{ steps.set-models.outputs.models }}
    steps:
      - id: set-models
        run: |
          MODELS=()
          # е®ҡж—¶и§ҰеҸ‘зј–иҜ‘е…ЁйғЁ
          if [ "${{ github.event_name }}" = "schedule" ]; then
            MODELS=("Lean_x86_64" "Lean_x86_64_Docker")
          else
            # жүӢеҠЁи§ҰеҸ‘еҲӨж–ӯ
            [ "${{ github.event.inputs.Lean_x86_64 }}" = "true" ] && MODELS+=("Lean_x86_64")
            [ "${{ github.event.inputs.Lean_x86_64_Docker }}" = "true" ] && MODELS+=("Lean_x86_64_Docker")
          fi
          
          # иҪ¬жҚўдёә JSON ж•°з»„
          JSON_MODELS=$(printf '%s\n' "${MODELS[@]}" | jq -R . | jq -s -c .)
          echo "models=$JSON_MODELS" >> $GITHUB_OUTPUT

  build:
    needs: [build-openwrt]
    runs-on: ubuntu-22.04
    env:
      CACHE_BUILD: ${{ github.event.inputs.CACHE_BUILD || 'true' }}
      SSH_ACTION: ${{ github.event.inputs.SSH_ACTION || 'false' }}
      CLEAN_CACHE: ${{ github.event.inputs.CLEAN_CACHE || 'false' }}
    if: needs.build-openwrt.outputs.selected_models != '[]' && (github.event.repository.owner.id == github.event.sender.id || ! github.event.sender.id)
    
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.build-openwrt.outputs.selected_models) }}

    name: зј–иҜ‘ ${{matrix.target}}
    
    steps:
    - name: зј–иҜ‘еҸӮж•°
      run: |
        echo "жӯЈеңЁзј–иҜ‘зӣ®ж Үи®ҫеӨҮ: ${{ matrix.target }}"
        echo "жҳҜеҗҰејҖеҗҜзј“еӯҳ: ${CACHE_BUILD}"
        echo "жҳҜеҗҰејҖеҗҜSSHиҝңзЁӢ: ${SSH_ACTION}"
        echo "жҳҜеҗҰжё…зҗҶзј“еӯҳ: ${CLEAN_CACHE}"

    - name: Checkout д»“еә“
      uses: actions/checkout@v4

    - name: жЈҖжөӢи„ҡжң¬и®ҫзҪ®
      run: |
        source "${GITHUB_WORKSPACE}/build/${{matrix.target}}/settings.ini"
        echo "REPO_URL=${REPO_URL}" >> $GITHUB_ENV
        echo "REPO_BRANCH=${REPO_BRANCH}" >> $GITHUB_ENV
        echo "CONFIG_FILE=${CONFIG_FILE}" >> $GITHUB_ENV
        echo "FIRMWARE_MESSAGE=${FIRMWARE_MESSAGE}" >> $GITHUB_ENV
        echo "CUSTOM_SH=${CUSTOM_SH}" >> $GITHUB_ENV
        echo "CACHE_BUILD=${CACHE_BUILD}" >> $GITHUB_ENV
        echo "SSH_ACTIONS=${SSH_ACTIONS}" >> $GITHUB_ENV
        echo "UPLOAD_FIRMWARE=${UPLOAD_FIRMWARE}" >> $GITHUB_ENV
        echo "UPLOAD_CONFIG=${UPLOAD_CONFIG}" >> $GITHUB_ENV
        echo "UPLOAD_RELEASE=${UPLOAD_RELEASE}" >> $GITHUB_ENV
        echo "TELEGRAM_BOT=${TELEGRAM_BOT}" >> $GITHUB_ENV
        # ж·»еҠ еҸҳйҮҸ
        echo "HOME=${GITHUB_WORKSPACE}/openwrt" >> $GITHUB_ENV
        echo "WORKPATH=${GITHUB_WORKSPACE}/openwrt/build/${{matrix.target}}" >> $GITHUB_ENV

    - name: жё…зҗҶзј–иҜ‘зј“еӯҳпјҲеҰӮйңҖиҰҒпјү
      if: env.CLEAN_CACHE == 'true'
      run: |
        echo "жӯЈеңЁејәеҲ¶жё…зҗҶзј–иҜ‘зј“еӯҳ..."
        # жё…зҗҶеҸҜиғҪзҡ„зҺ°жңүopenwrtзӣ®еҪ•
        sudo rm -rf $GITHUB_WORKSPACE/openwrt
        echo "зј–иҜ‘зј“еӯҳе·Іжё…зҗҶ"

    - name: еҲқе§ӢеҢ–зі»з»ҹзҺҜеўғ
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/apt/sources.list.d /usr/local/lib/android
        sudo -E apt-mark hold grub-efi-amd64-signed
        sudo -E apt update -y
        sudo -E apt -y purge azure-cli* docker* ghc* zulu* llvm* firefox google* dotnet* powershell* openjdk* mysql* php* mongodb* dotnet* snap* || true
        sudo -E apt full-upgrade -y
        sudo -E apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
                   bzip2 ccache clang cmake cpio curl device-tree-compiler ecj flex gawk gcc-multilib \
                   g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-i386 libelf-dev \
                   libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev \
                   libreadline-dev libssl-dev libpython3-dev libtool libyaml-dev libz-dev lld llvm lrzsz msmtp \
                   ninja-build p7zip p7zip-full patch pkgconf python3 python3 python3-ply python3-docutils \
                   python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
                   upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd libfuse-dev gettext genisoimage python3-setuptools || true
        sudo -E systemctl daemon-reload
        sudo -E apt -y autoremove --purge
        sudo -E apt clean

    - name: зј–иҜ‘еүҚеҮҶеӨҮ
      run: |
        sudo -E apt-get -y install xsltproc zip grep python3-pip python3-ply libc6-dev libtinfo-dev libtinfo5 ncurses-doc \
                    python2 git-core wget curl rsync dos2unix fakeroot jq libc6-dev-i386 libncurses5-dev libncursesw5 \
                    libncursesw5-dev quilt python3-distutils file g++ || true
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        sudo timedatectl set-timezone "$TZ"
        echo
        echo " зі»з»ҹз©әй—ҙ      зұ»еһӢ   жҖ»ж•°  е·Із”Ё  еҸҜз”Ё дҪҝз”ЁзҺҮ"
        df -hT $PWD

    - name: йҮҠж”ҫUbuntuзЈҒзӣҳз©әй—ҙ
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    # з§»йҷӨдәҶеҲӣе»әжЁЎжӢҹзү©зҗҶзЈҒзӣҳзҡ„жӯҘйӘӨпјҢзӣҙжҺҘеңЁй»ҳи®Өзӣ®еҪ•дёӢж“ҚдҪң

    - name: дёӢиҪҪ${{matrix.target}}жәҗз Ғ
      run: |
        df -hT $PWD
        git clone -b $REPO_BRANCH --single-branch $REPO_URL openwrt
        # дёҚеҶҚйңҖиҰҒеҲӣе»әз¬ҰеҸ·й“ҫжҺҘпјҢеӣ дёәзӣҙжҺҘе…ӢйҡҶеҲ°дәҶ $GITHUB_WORKSPACE/openwrt

    - name: зј“еӯҳеҠ йҖҹ
      uses: stupidloud/cachewrtbuild@main
      if: env.CACHE_BUILD == 'true' || (github.event.inputs.CACHE_BUILD == 'true')
      with:
        ccache: 'true'
        prefix: ${{ github.workspace }}/openwrt

    - name: жӣҙж–°ж—¶еҢәгҖҒзј–иҜ‘ж—¶й—ҙ
      id: date
      run: |
        sudo timedatectl set-timezone "$TZ"
        echo "FILE_TIME=$(date +"%m-%d %H.%M")" >> $GITHUB_ENV
        echo "FILE_TIME1=$(date "+%Yе№ҙ%mжңҲ%dж—Ҙ-%HзӮ№%MеҲҶ")" >> $GITHUB_ENV
        echo "FILE_TIME2=$(date "+%Y%m%d-%H%M")" >> $GITHUB_ENV
        echo "зј–иҜ‘ејҖе§Ӣж—¶й—ҙ..."
        START_TIME=`date +'%Y-%m-%d %H:%M:%S'`
        echo "START_SECONDS=$(date --date="$START_TIME" +%s)" >> $GITHUB_ENV

    - name: еҠ иҪҪжәҗ,е®ҡеҲ¶ж–Үд»¶е№¶з”ҹжҲҗиҮӘе®ҡд№үй…ҚзҪ®
      run: |
        # еӨҚеҲ¶й…ҚзҪ®ж–Үд»¶еҲ°жәҗз Ғзӣ®еҪ•
        cp -Rf `find ./ -maxdepth 1 -type d ! -path './openwrt' ! -path './'` openwrt
        cd openwrt

        # жү§иЎҢ custom.sh з”ҹжҲҗ .config е’Ңе…¶д»–е®ҡеҲ¶
        if [ -f "${WORKPATH}/$CUSTOM_SH" ]; then
          chmod +x "${WORKPATH}/$CUSTOM_SH"
          /bin/bash "${WORKPATH}/$CUSTOM_SH"
        fi

        # зЎ®дҝқеңЁ openwrt ж №зӣ®еҪ•
        cd "$HOME"

        echo "еӨҚеҲ¶и„ҡжң¬ж–Үд»¶..."
        if [ -n "$(ls -A "${GITHUB_WORKSPACE}/openwrt/build/scripts/files" 2>/dev/null)" ]; then
          if [ -d "files" ];then
           cp -rf ${GITHUB_WORKSPACE}/openwrt/build/scripts/files/* files
           chmod -R 755 files
          else
           cp -rf ${GITHUB_WORKSPACE}/openwrt/build/scripts/files/ files
           chmod -R 755 files
          fi
        fi

        echo "еӨҚеҲ¶й…ҚзҪ®ж–Үд»¶..."
        if [ -n "$(ls -A "${WORKPATH}/files" 2>/dev/null)" ]; then
          if [ -d "files" ];then
           cp -rf ${WORKPATH}/files/* files
           chmod -R 755 files
          else
           cp -rf ${WORKPATH}/files/ files
           chmod -R 755 files
          fi
        fi

        echo "еӨҚеҲ¶жәҗз Ғж–Үд»¶..."
        if [ -n "$(ls -A "${WORKPATH}/sources" 2>/dev/null)" ]; then
         cp -Rf ${WORKPATH}/sources/* ./
        fi

        # дёҚеҶҚдҪҝз”Ё mv ${WORKPATH}/$CONFIG_FILE .configпјҢеӣ дёә custom.sh е·Із”ҹжҲҗ .config

        make defconfig

    - name: SSHиҝңзЁӢиҝһжҺҘжңҚеҠЎеҷЁ
      uses: db-one/debugger-action@main
      if: env.SSH_ACTIONS == 'true' || (github.event.inputs.SSH_ACTION == 'true')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: иҫ“еҮәзј–иҜ‘дҝЎжҒҜ
      run: |
        cd openwrt

        echo
        echo " зі»з»ҹз©әй—ҙ      зұ»еһӢ   жҖ»ж•°  е·Із”Ё  еҸҜз”Ё дҪҝз”ЁзҺҮ"
        df -hT $PWD

        echo
        echo "=========================================="
        echo

        echo "	    CPUзү©зҗҶж•°йҮҸ:$(cat /proc/cpuinfo| grep "physical id"| sort| uniq| wc -l)"
        echo "	    CPUж ёеҝғеҸҠзүҲжң¬дҝЎжҒҜпјҡ$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c)"

        echo
        echo "=========================================="
        echo


        ZZZ="package/lean/default-settings/files/zzz-default-settings"
        if [ -f "$ZZZ" ]; then
          echo "	    еҪ“еүҚзј–иҜ‘зүҲжң¬пјҡ$(cat $ZZZ|grep DISTRIB_REVISION= | sed 's/^.\{24\}//g' | sed 's/.\{26\}$//')"
        fi

        echo "KERNEL_PATCHVER=$(cat target/linux/x86/Makefile|grep KERNEL_PATCHVER | sed 's/^.\{17\}//g')" >> $GITHUB_ENV
        echo "	    еҶ…ж ёзүҲжң¬пјҡ$(cat target/linux/x86/Makefile|grep KERNEL_PATCHVER | sed 's/^.\{17\}//g')"
        echo "	    жәҗз ҒеҲҶж”Ҝпјҡ${{ env.REPO_BRANCH }}"

        echo "	    зј–иҜ‘ж—¶й—ҙпјҡ${{ env.FILE_TIME1 }}"

        echo
        echo "=========================================="

        grep -i CONFIG_PACKAGE_luci-app .config | grep  -v \# > Plug-in
        grep -i CONFIG_PACKAGE_luci-theme .config | grep  -v \# >> Plug-in
        sed -i '/INCLUDE/d' Plug-in > /dev/null 2>&1
        sed -i 's/CONFIG_PACKAGE_/гҖҒ/g' Plug-in
        sed -i '/Transparent_Proxy/d' Plug-in > /dev/null 2>&1
        sed -i '/qbittorrent-simple_dynamic/d' Plug-in > /dev/null 2>&1
        sed -i 's/=y/\ /g' Plug-in
        awk '$0=NR$0' Plug-in > Plug-2
        awk '{print "	" $0}' Plug-2 > Plug-in

        echo
        echo
        echo "	      е·ІйҖүжҸ’д»¶еҲ—иЎЁ"
        cat Plug-in
        rm -rf {Plug-in,Plug-2}

        echo
        echo "=========================================="

        echo
        echo
        echo "иҫ“еҮәе®Ңж•ҙжҸ’д»¶дҝЎжҒҜ..."
        echo
        echo
        cat .config

    - name: дёӢиҪҪзј–иҜ‘жүҖйңҖж–Үд»¶
      run: |
        cd openwrt && make download -j4

    - name: ејҖе§Ӣзј–иҜ‘еӣәд»¶
      id: compile
      run: |
        cd openwrt
        make -j$(nproc) V=sc 2>&1 | tee build.log || (echo "зј–иҜ‘еӨұиҙҘпјҢжҹҘзңӢиҜҰз»Ҷж—Ҙеҝ—..." && tail -n 100 build.log && exit 1)

    - name: жЈҖжҹҘз©әй—ҙдҪҝз”Ёжғ…еҶө
      run: |
        echo "======================="
        echo "Space usage:"
        echo "======================="
        df -hT
        echo "======================="
        du -h --max-depth=1 openwrt/ --exclude=build_dir --exclude=bin
        du -h --max-depth=1 openwrt/build_dir
        du -h --max-depth=1 openwrt/bin

    - name: иҜҰз»Ҷй”ҷиҜҜиҜҠж–ӯ
      if: failure()
      run: |
        # дҪҝз”Ё $HOME зҺҜеўғеҸҳйҮҸиҝӣе…Ҙ openwrt зӣ®еҪ•
        cd "$HOME" || { echo "зӣ®еҪ• $HOME дёҚеӯҳеңЁ"; exit 1; }
        echo "=== иҜҰз»Ҷй”ҷиҜҜиҜҠж–ӯ ==="
        
        echo "1. жЈҖжҹҘеҢ…еҶІзӘҒ:"
        grep -E "CONFIG_PACKAGE_(vsftpd|vsftpd-alt)" .config || echo "жңӘжүҫеҲ° FTP зӣёе…ій…ҚзҪ®"
        
        echo ""
        echo "2. жҹҘжүҫе…¶д»–еҸҜиғҪзҡ„еҶІзӘҒ:"
        find . -name "*.mk" -exec grep -l "conflict\|clash" {} \; | head -n 5
        
        echo ""
        echo "3. жЈҖжҹҘзј–иҜ‘ж—Ҙеҝ—дёӯзҡ„й”ҷиҜҜ:"
        grep -i "error\|conflict\|clash" build.log | tail -n 20
        
        echo ""
        echo "4. жЈҖжҹҘе·Іе®үиЈ…зҡ„еҢ…:"
        find staging_dir -name "*.install" -exec grep -l "vsftpd" {} \; | head -n 5

    - name: ж•ҙзҗҶеӣәд»¶ж–Үд»¶
      if: success()
      id: organizer
      run: |
        mkdir -p ./artifact/firmware
        mkdir -p ./artifact/buildinfo
        cp -rf openwrt/.config ./artifact/buildinfo/${{matrix.target}}.config || true
        rm -rf $(find openwrt/bin/targets/ -type d -name "packages")
        cp -rf $(find openwrt/bin/targets/ -type f -name "*.buildinfo" -o -name "*.manifest") ./artifact/buildinfo/ || true        
        
        # еӨҚеҲ¶ squashfs е’Ң ext4 ж јејҸзҡ„еӣәд»¶пјҲеҢ…еҗ« efi зҡ„пјү
        echo "=== жӯЈеңЁеӨҚеҲ¶еӣәд»¶ж–Үд»¶ ==="
        find openwrt/bin/targets/ -type f \( -name "*squashfs*efi*img*" -o -name "*ext4*efi*img*" \) 2>/dev/null | while read file; do
          echo "еӨҚеҲ¶: $(basename "$file")"
          cp "$file" ./artifact/firmware/
        done
        
        # жҳҫзӨәе·ІеӨҚеҲ¶зҡ„ж–Үд»¶
        echo "=== е·ІеӨҚеҲ¶зҡ„еӣәд»¶ ==="
        ls -lh ./artifact/firmware/
        
        echo "зј–иҜ‘е®ҢжҲҗж—¶й—ҙ..."
        START_SECONDS=${{ env.START_SECONDS }}
        END_TIME=`date +'%Y-%m-%d %H:%M:%S'`
        END_SECONDS=$(date --date="$END_TIME" +%s)
        SECONDS=$((END_SECONDS-START_SECONDS))
        HOUR=$(( $SECONDS/3600 )) && MIN=$(( ($SECONDS-${HOUR}*3600)/60 )) && SEC=$(( $SECONDS-${HOUR}*3600-${MIN}*60 ))
        echo "BUILD_TIME=${HOUR}ж—¶${MIN}еҲҶ${SEC}з§’" >> $GITHUB_ENV

    - name: дёҠдј еӣәд»¶ж–Үд»¶
      if: steps.compile.outcome == 'success' && env.UPLOAD_FIRMWARE == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{matrix.target}}_OpenWrt_firmware_${{ env.FILE_TIME }}
        path: ./artifact/firmware/

    - name: дёҠдј зј–иҜ‘ж—Ҙеҝ—
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build_log_${{ github.run_id }}
        path: openwrt/build.log

    - name: дёҠдј еӣәд»¶дҝЎжҒҜ
      if: steps.compile.outcome == 'success' && env.UPLOAD_CONFIG == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{matrix.target}}_OpenWrt_buildinfo_${{ env.FILE_TIME }}
        path: ./artifact/buildinfo/

    - name: иҮӘеҠЁеҸ‘еёғеӣәд»¶еҲ° Releases
      uses: ncipollo/release-action@main
      if: steps.compile.outcome == 'success' && env.UPLOAD_RELEASE == 'true'
      with:
        name: ${{ env.FILE_TIME1 }} гҖҢ ${{ env.FIRMWARE_MESSAGE }} гҖҚ
        tag: ${{ env.FILE_TIME2 }}-${{matrix.target}}
        token: ${{ secrets.MY_GITHUB_TOKEN }}
        body: |            
            вҳ…  жәҗз Ғ : ${{ env.REPO_URL }}
            вҳ…  еҲҶж”Ҝ : ${{ env.REPO_BRANCH }}
            вҳ…  ж„ҹи°ўжәҗз ҒдҪңиҖ…ж— з§ҒеҲҶдә«пјҒ

            рҹ–Ҙ еҶ…ж ёзүҲжң¬пјҡ${{ env.KERNEL_PATCHVER }}

            рҹҺҲ зј–иҜ‘ж—¶й—ҙпјҡ${{ env.FILE_TIME1 }}

            вҸ° зј–иҜ‘з”Ёж—¶пјҡ${{ env.BUILD_TIME }}

            рҹҺү [ ${{ env.FIRMWARE_MESSAGE }} ]еӣәд»¶дёӢиҪҪ

            в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ

            =========================================

        artifacts: ./artifact/firmware/*

    - name: еҲ йҷӨиҝҗиЎҢи®°еҪ•
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ secrets.MY_GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 30
        keep_minimum_runs: 0

    - name: еҲ йҷӨиҮӘеҠЁеҸ‘еёғзҡ„ж—§еӣәд»¶
      uses: shidahuilang/delete-older-releases@main
      if: steps.compile.outcome == 'success' && env.UPLOAD_RELEASE == 'true'
      with:
        keep_latest: 20
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}

    - name: зј–иҜ‘жҲҗеҠҹдҝЎжҒҜйҖҡзҹҘ-Telegram
      if: steps.compile.outcome == 'success' && env.TELEGRAM_BOT == 'true'
      run: |
        curl "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=

           жӮЁзҡ„${{ env.FIRMWARE_MESSAGE }}еӣәд»¶жҲҗеҠҹзј–иҜ‘е®ҢжҲҗдәҶпјҒ

