name: 定时更新 OpenClash 数据文件

on:
  schedule:
    # 每2天的 0:00 UTC 执行一次（可根据需要调整）
    - cron: '0 0 */2 * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  update-geo-files:
    runs-on: ubuntu-latest

    steps:
    - name: 检出仓库
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}  # 使用 GITHUB_TOKEN 授权

    - name: 配置 Git 用户
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: 创建临时目录
      run: mkdir -p /tmp/geo-files

    - name: 下载 geoip.dat
      run: |
        curl -L -o /tmp/geo-files/geoip.dat \
          "https://raw.githubusercontent.com/Loyalsoldier/geoip/release/geoip.dat"
        echo "geoip.dat 下载完成"

    - name: 下载 Country.mmdb
      run: |
        curl -L -o /tmp/geo-files/Country.mmdb \
          "https://raw.githubusercontent.com/Loyalsoldier/geoip/release/Country.mmdb"
        echo "Country.mmdb 下载完成"

    - name: 下载 geosite.dat
      run: |
        curl -L -o /tmp/geo-files/geosite.dat \
          "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat"
        echo "geosite.dat 下载完成"

    - name: 下载 ASN.mmdb 并重命名
      run: |
        curl -L -o /tmp/geo-files/ASN.mmdb \
          "https://raw.githubusercontent.com/Loyalsoldier/geoip/release/GeoLite2-ASN.mmdb"
        echo "ASN.mmdb 下载完成"

    - name: 定义目标路径（支持多个目标）
      run: |
        # 定义需要更新的目标目录列表
        TARGET_DIRS=(
          "build/Lean_x86_64/sources/etc/openclash"
          "build/Lean_x86_64_Docker/sources/etc/openclash"
        )

        for target in "${TARGET_DIRS[@]}"; do
          if [ -d "$target" ]; then
            echo "更新目录: $target"
            cp -f /tmp/geo-files/* "$target/"
          else
            echo "警告: 目录 $target 不存在，跳过"
          fi
        done

    - name: 检查是否有文件变化
      id: check_changes
      run: |
        git add build/*/sources/etc/openclash/
        if git diff --cached --quiet; then
          echo "没有文件变化，跳过提交"
          echo "has_changes=false" >> $GITHUB_OUTPUT
        else
          echo "检测到文件变化"
          echo "has_changes=true" >> $GITHUB_OUTPUT
        fi

    - name: 提交并推送更改
      if: steps.check_changes.outputs.has_changes == 'true'
      run: |
        git commit -m "chore: 自动更新 OpenClash 数据文件 [skip ci]"
        git push
